name: CI
on:
    pull_request:
    push:
        branches:
            - "master"
jobs:
    phpstan:
        name: PHPStan
        runs-on: ubuntu-24.04
        steps:
            -   uses: actions/checkout@v6
            -   uses: shivammathur/setup-php@v2
                with:
                    coverage: none
                    extensions: json, snmp
                    php-version: 8.4
                    tools: cs2pr

            -   name: Install dependencies with composer
                uses: ramsey/composer-install@v4
                with:
                    dependency-versions: highest
                    composer-options: --prefer-stable

            -   name: Run a static analysis with phpstan/phpstan
                env:
                    PHPSTAN_ARGS: --error-format=checkstyle
                run: make -is static-analysis | cs2pr

    coding-standards:
        name: Coding Standards
        runs-on: ubuntu-24.04
        steps:
            -   uses: actions/checkout@v6
            -   uses: shivammathur/setup-php@v2
                with:
                    coverage: none
                    extensions: snmp
                    php-version: 8.4
                    tools: cs2pr

            -   name: Install dependencies with composer
                uses: ramsey/composer-install@v4
                with:
                    dependency-versions: highest
                    composer-options: --prefer-stable

            -   name: Run squizlabs/php_codesniffer
                env:
                    PHPCS_ARGS: -q --no-colors --report=checkstyle
                run: make -is cs | cs2pr

    tests:
        name: Tests
        runs-on: ubuntu-24.04
        strategy:
            matrix:
                php-version: [8.4, 8.5]
                dependencies: ["", --prefer-lowest]

        steps:
            -   uses: actions/checkout@v6
            -   uses: shivammathur/setup-php@v2
                with:
                    coverage: "pcov"
                    extensions: json, snmp
                    php-version: ${{ matrix.php-version }}

            -   name: Install dependencies
                run: sudo apt install snmp

            -   name: Install snmpsim via Docker
                run: |
                    docker run -d --name snmpsim --network host \
                      -v "${{ github.workspace }}/tests/Transport/data:/data:ro" \
                      python:3.10-slim \
                      bash -c "pip install 'snmpsim==0.4.7' 'pysnmp>=4.4,<5' 'pyasn1<0.5' 'pysmi<0.4' 'pycryptodomex' && rm -rf /usr/local/snmpsim/data && useradd -r -m snmpsim && cp -r /data /home/snmpsim/data && chown -R snmpsim:snmpsim /home/snmpsim && su snmpsim -s /bin/bash -c 'snmpsimd.py --v2c-arch --data-dir=/home/snmpsim/data --agent-udpv4-endpoint 127.0.0.1:15000'"
                    for i in $(seq 1 60); do
                      snmpget -v2c -c public -t 1 -r 0 127.0.0.1:15000 .1.3.6.1.2.1.1.3.0 2>/dev/null && break
                      sleep 2
                    done

            -   name: Install highest dependencies with composer
                if: matrix.dependencies == ''
                uses: ramsey/composer-install@v4
                with:
                    dependency-versions: highest
                    composer-options: --prefer-stable

            -   name: Install lowest dependencies with composer
                if: matrix.dependencies == '--prefer-lowest'
                uses: ramsey/composer-install@v4
                with:
                    dependency-versions: lowest

            -   name: Run tests
                env:
                    SNMPSIM_EXTERNAL: "1"
                run: PHPUNIT_ARGS="--coverage-clover coverage.xml" make test


            -   name: "Upload coverage file"
                uses: actions/upload-artifact@v7
                with:
                    name: "phpunit-${{ matrix.dependencies }}-${{ matrix.php-version }}.coverage"
                    path: "coverage.xml"

    upload_coverage:
        name: "Upload coverage to Codecov"
        runs-on: "ubuntu-24.04"
        needs:
            - "tests"

        steps:
            - name: "Checkout"
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: "Download coverage files"
              uses: actions/download-artifact@v8
              with:
                  path: "reports"

            - name: "Upload to Codecov"
              uses: codecov/codecov-action@v6
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              with:
                  directory: reports
